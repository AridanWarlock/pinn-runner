defaults:
  - train
  - _self_

task_name: heat_test

N_initial: 200
N_boundary: 1000
N_sample: 50_000
Epochs: 50_000

mesh:
  _target_: pinnstorch.data.PointCloud

train_datasets:
  - mesh_sampler:
      _target_: pinnstorch.data.MeshSampler
      _partial_: true
      num_sample: ${N_sample}
      collection_points:
        - f_T
  - initial_condition:
      _target_: pinnstorch.data.InitialCondition
      _partial_: true
      num_sample: ${N_initial}
      solution:
        - T
  - left_bc:
      _target_: pinnstorch.data.BoundaryCondition1D
      _partial_: true
      bc_func_name: left_bc
      location: left
      num_sample: ${N_boundary}
  - right_bc:
      _target_: pinnstorch.data.BoundaryCondition1D
      _partial_: true
      bc_func_name: right_bc
      location: right
      num_sample: ${N_boundary}

val_dataset:
  - mesh_sampler:
      _target_: pinnstorch.data.MeshSampler
      _partial_: true
      solution:
        - T

pred_dataset:
  - mesh_sampler:
      _target_: pinnstorch.data.MeshSampler
      _partial_: true
      solution:
        - T

net:
  _target_: pinnstorch.models.FCN
  layers: [2, 64, 64, 64, 64, 1]
  output_names:
    - T

trainer:
  max_epochs: ${Epochs}
  check_val_every_n_epoch: 100

model:
  loss_fn: mse
  cudagraph_compile: false

  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    capturable: false
    lr: 1e-3
    weight_decay: 0.0
  # optimizer:
  #   _target_: torch.optim.LBFGS
  #   # _partial_: true
  #   lr: 1.0
  #   max_iter: 20
  #   tolerance_grad: 1e-9
  #   tolerance_change: 1e-11
  #   history_size: 100
  #   line_search_fn: strong_wolfe
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    _partial_: true
    T_max: ${Epochs}
    eta_min: 1e-7

# model:
#   optimizer:
#     _target_: torch.optim.AdamW
#     _partial_: true
#     lr: 0.001
#     weight_decay: 1e-4
#   scheduler:
#     _target_: torch.optim.lr_scheduler.CyclicLR
#     _partial_: true
#     base_lr: 1e-5
#     max_lr: 0.001
#     step_size_up: 2000
#     mode: triangular2
#     cycle_momentum: false

callbacks:
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val/loss
    patience: 10000
    mode: min
    min_delta: 0.01

plotting:
  _target_: pinnstorch.utils.plot_heat
  _partial_: true

train: true
val: false
test: true
optimized_metric:
  error:
    - T

seed: 1234

hydra:
  searchpath:
    - pkg://pinnstorch/conf
